name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Escaneo de Seguridad Dinámico (DAST)

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8" # Adaptado a la versión de tu proyecto

      - name: Construir la aplicación
        run: mvn -B -DskipTests package

      - name: Levantar la aplicación
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Esperar a que la aplicación esté lista
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080 >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          tail -n 200 app.log || true
          exit 1

      - name: Preparar directorio con permisos para ZAP
        run: mkdir -p ${{ github.workspace }}/.zap && chmod -R 777 ${{ github.workspace }}/.zap

      - name: Escaneo ZAP Baseline
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-J .zap/report_json.json -w .zap/report_md.md -r .zap/report_html.html'

      - name: Subir reporte ZAP como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: .zap/

      - name: Apagar aplicación
        if: always()
        run: |
          kill $(cat app.pid) || true
